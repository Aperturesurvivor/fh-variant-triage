name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest
      - name: Check example CSV schema path
        run: python scripts/score_variants_csv.py examples/example_variants.csv reports/example_scored_variants.csv
      - name: Check example VCF schema path
        run: python scripts/score_variants_vcf.py examples/example_annotated.vcf reports/example_vcf_scored_variants.csv
