name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest
      - name: Check example CSV schema path
        run: python -c "import pandas as pd; from scripts.score_variants_csv import ensure_columns; df = pd.read_csv('examples/example_variants.csv'); normalized = ensure_columns(df); assert {'GeneSymbol', 'variant_type_simple', 'name_length'}.issubset(normalized.columns); print('example CSV schema check passed')"
      - name: Check example VCF schema path
        run: python -c "from pathlib import Path; from scripts.score_variants_vcf import vcf_to_dataframe; df = vcf_to_dataframe(Path('examples/example_annotated.vcf')); assert len(df) == 2; assert set(df['GeneSymbol']) == {'LDLR', 'APOB'}; print('example VCF parser check passed')"
